<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#FFFFFF"/>
  
  <!-- Outer circle border -->
  <circle cx="150" cy="150" r="140" 
          fill="none" stroke="#003366" stroke-width="10"/>
  
  <!-- Inner circle -->
  <circle cx="150" cy="150" r="120" 
          fill="none" stroke="#003366" stroke-width="3"/>
  
  <!-- Institution name (top arc) -->
  <path id="topArc" d="M 50,150 
                         A 100,100 0 0,1 250,150" 
        fill="none"/>
  <text font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="#003366" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">
      TEST UNIVERSITY
    </textPath>
  </text>
  
  <!-- Center star -->
  <path d="M 150,120 L 158.8167787843871,137.86474508437578 L 178.5316954888546,140.72949016875157 L 164.2658477444273,154.63525491562422 L 167.6335575687742,174.27050983124843 L 150,165 L 132.3664424312258,174.27050983124843 L 135.7341522555727,154.63525491562422 L 121.46830451114539,140.72949016875157 L 141.1832212156129,137.86474508437578 Z" fill="#003366"/>
  
  <!-- Year -->
  <text x="150" y="185" 
        font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#003366" text-anchor="middle">
    2024
  </text>
  
  <!-- Bottom text -->
  <text x="150" y="240" 
        font-family="Arial, sans-serif" font-size="16"
        fill="#003366" text-anchor="middle">
    EXCELLENCE IN EDUCATION
  </text>
  
  <!-- Subtitle arc (bottom) -->
  
  <path id="bottomArc" d="M 50,150 
                           A 100,100 0 0,0 250,150" 
        fill="none"/>
  <text font-family="Arial, sans-serif" font-size="18" 
        fill="#003366" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">
      OFFICIAL SEAL
    </textPath>
  </text>
  
</svg>